name: Publish releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version number to tag and release'
        required: true
        type: string
      prerelease:
        description: 'Release as pre-release'
        required: false
        type: boolean
        default: false
      skip-tests:
        description: 'Skip tests (use if tests already passed in CI)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml
    with:
      run-tests: ${{ inputs.skip-tests == false }}

  release-npm:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: .
      - name: Change version number
        run: node scripts/update-version.mjs ${{ inputs.version }}
      - name: Update lockfile
        run: pnpm install
      - name: GIT commit and push all changed files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -a -m "Bumped v${{ inputs.version }}"
          git push origin HEAD:${{ github.ref }}
      - name: Update npm
        run: npm install -g npm@latest
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag ${{ inputs.prerelease == true && 'next' || 'latest' }}
      - name: Create release notes
        run: |
          npx @matteo.collina/release-notes -a ${{ secrets.GITHUB_TOKEN }} -t v${{ inputs.version }} -r php-node -o platformatic ${{ inputs.prerelease == true && '-p' || '' }} -c ${{ github.ref }}
